name: Build installers

# Triggers:
#   - workflow_dispatch: any-time manual run from the Actions tab.
#       Builds installers and attaches them to the workflow run as
#       artifacts (downloadable as .zip). No GitHub Release is created.
#   - push to a tag like v1.0.0 / v0.2.3-beta1: creates (or reuses) a
#       Draft Release with the matching tag, and attaches each
#       per-platform installer DIRECTLY as a release asset (no .zip
#       wrapping — users click the .msi / .dmg and the OS opens the
#       installer immediately).
#
# Output per platform:
#   - Windows: .msi + .exe   (Warwolf_X.Y.Z_x64_en-US.msi, Warwolf_X.Y.Z_x64-setup.exe)
#   - macOS:   .dmg + .app.tar.gz (aarch64-apple-darwin / Apple Silicon)
#
# Architecture (why two stages on tag-push):
#   tauri-action's "create release in matrix" path races between matrix
#   jobs and frequently silently fails to create the release. The
#   robust pattern is: a single create-release job builds the release
#   shell first, then the matrix build jobs upload assets to the
#   already-existing release via releaseId. That's what this workflow
#   does. For workflow_dispatch (no tag), create-release is skipped
#   and matrix jobs behave as before.
#
# Sidecar: Tauri shell is a thin wrapper that spawns desktop-server
# (the HTTP backend) at runtime. desktop-server lives in the rust/
# workspace and is NOT compiled by `cargo tauri build`. So each
# matrix entry first builds desktop-server for its target, stages it
# under apps/desktop-shell/src-tauri/binaries/desktop-server-<TRIPLE>
# per Tauri's externalBin filename convention, then runs tauri build.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Only on tag push: create the Draft Release shell first, so the
  # matrix build jobs can upload to a known release id.
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create (or reuse) Draft Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const isPre = tag.includes('-');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Try to find an existing release for this tag (handles re-runs).
            let release;
            try {
              const found = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = found.data;
              core.info(`Reusing existing release ${release.id} for tag ${tag}`);
            } catch (err) {
              if (err.status !== 404) throw err;
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Buddy ${tag}`,
                body: 'Installers are attached below. Pick the one for your OS:\n\n' +
                      '- **Windows**: download the `.msi` (or `.exe` NSIS installer) and double-click.\n' +
                      '- **macOS Apple Silicon**: download the `.dmg`, drag Warwolf to Applications. ' +
                      'On first launch, run `xattr -d com.apple.quarantine /Applications/Warwolf.app` ' +
                      'to bypass Gatekeeper for this unsigned build.',
                draft: true,
                prerelease: isPre,
              });
              release = created.data;
              core.info(`Created draft release ${release.id} for tag ${tag}`);
            }
            core.setOutput('release_id', release.id);

  build:
    name: Build (${{ matrix.label }})
    needs: [create-release]
    # Run even when create-release is skipped (workflow_dispatch path).
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bin-ext: ".exe"
            tauri-args: "--target x86_64-pc-windows-msvc"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            bin-ext: ""
            tauri-args: "--target aarch64-apple-darwin"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust toolchain (host + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (rust workspace)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: rust-${{ matrix.label }}

      - name: Cache cargo (src-tauri shell)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-shell/src-tauri
          shared-key: tauri-${{ matrix.label }}

      - name: Build desktop-server backend (${{ matrix.target }})
        working-directory: rust
        run: cargo build --release --bin desktop-server --target ${{ matrix.target }}

      - name: Stage desktop-server as Tauri sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop-shell/src-tauri/binaries
          src="rust/target/${{ matrix.target }}/release/desktop-server${{ matrix.bin-ext }}"
          dst="apps/desktop-shell/src-tauri/binaries/desktop-server-${{ matrix.target }}${{ matrix.bin-ext }}"
          cp "$src" "$dst"
          ls -lh apps/desktop-shell/src-tauri/binaries/

      - name: Install npm dependencies
        working-directory: apps/desktop-shell
        run: npm ci

      - name: Build Tauri installer (uploads to existing release if releaseId is set)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-shell
          args: ${{ matrix.tauri-args }}
          # Empty when workflow_dispatch (no tag) → tauri-action just
          # builds and skips upload. Set when tag push → tauri-action
          # uploads .msi/.dmg/.exe directly as release assets.
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Upload installer artifacts (workflow run)
        # Always upload the per-run artifact too — useful for
        # workflow_dispatch testing without creating a release.
        uses: actions/upload-artifact@v4
        with:
          name: buddy-installer-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
