name: Build installers

# Triggers:
#   - workflow_dispatch: any-time manual run from the Actions tab.
#       Produces installer artifacts (downloadable from the run page);
#       does NOT create a GitHub Release.
#   - push to a tag like v1.0.0 / v0.2.3-beta1: also auto-creates a
#       draft GitHub Release with all installers attached, ready for
#       the maintainer to publish.
#
# Output per platform:
#   - Windows: .msi + .exe   (Warwolf_X.Y.Z_x64_en-US.msi, Warwolf_X.Y.Z_x64-setup.exe)
#   - macOS:   .dmg + .app.tar.gz (universal binary, runs on Intel + Apple Silicon)
#
# No code signing is configured. Mac/Windows users will see a one-time
# Gatekeeper / SmartScreen prompt; that's expected for unsigned builds.
# Add Apple/Authenticode signing env vars later when production-ready.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            tauri-args: ""
            rust-targets: ""
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop-shell/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos-universal
            tauri-args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop-shell/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo (src-tauri + workspace)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop-shell/src-tauri
            rust
          shared-key: tauri-${{ matrix.label }}

      - name: Install npm dependencies
        working-directory: apps/desktop-shell
        run: npm ci

      - name: Build Tauri installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-shell
          args: ${{ matrix.tauri-args }}
          # Only fill release fields when the trigger is a tag push;
          # workflow_dispatch runs skip release creation and only
          # upload artifacts via the next step.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Buddy {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload installer artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: buddy-installer-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
