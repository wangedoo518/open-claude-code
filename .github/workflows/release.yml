name: Build installers

# Triggers:
#   - workflow_dispatch: any-time manual run from the Actions tab.
#       Produces installer artifacts (downloadable from the run page);
#       does NOT create a GitHub Release.
#   - push to a tag like v1.0.0 / v0.2.3-beta1: also auto-creates a
#       draft GitHub Release with all installers attached, ready for
#       the maintainer to publish.
#
# Output per platform:
#   - Windows: .msi + .exe   (Warwolf_X.Y.Z_x64_en-US.msi, Warwolf_X.Y.Z_x64-setup.exe)
#   - macOS:   .dmg + .app.tar.gz (aarch64-apple-darwin / Apple Silicon)
#
# IMPORTANT — sidecar architecture:
#   The Tauri shell at runtime spawns `desktop-server` as a child
#   process (see apps/desktop-shell/src-tauri/src/main.rs ::
#   spawn_desktop_server_process). The HTTP backend lives in the
#   separate rust/ workspace and is NOT compiled by `cargo tauri build`.
#   So this workflow has TWO compile phases per matrix entry:
#     1) cargo build --release -p desktop-server (in rust/ workspace),
#        producing the per-target backend binary.
#     2) Stage that binary as `apps/desktop-shell/src-tauri/binaries/
#        desktop-server-<TARGET>(.exe)` per Tauri's externalBin spec.
#     3) `tauri build` then bundles the staged sidecar into the .msi /
#        .dmg automatically.
#   Without phase 1+2 the installer would ship an empty shell that
#   fails on launch with "Unable to locate desktop-server binary".
#
# No code signing is configured. Mac/Windows users will see a one-time
# Gatekeeper / SmartScreen prompt; that's expected for unsigned builds.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bin-ext: ".exe"
            tauri-args: "--target x86_64-pc-windows-msvc"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            bin-ext: ""
            tauri-args: "--target aarch64-apple-darwin"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust toolchain (host + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (rust workspace)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: rust-${{ matrix.label }}

      - name: Cache cargo (src-tauri shell)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-shell/src-tauri
          shared-key: tauri-${{ matrix.label }}

      - name: Build desktop-server backend (${{ matrix.target }})
        working-directory: rust
        run: cargo build --release --bin desktop-server --target ${{ matrix.target }}

      - name: Stage desktop-server as Tauri sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop-shell/src-tauri/binaries
          src="rust/target/${{ matrix.target }}/release/desktop-server${{ matrix.bin-ext }}"
          dst="apps/desktop-shell/src-tauri/binaries/desktop-server-${{ matrix.target }}${{ matrix.bin-ext }}"
          cp "$src" "$dst"
          ls -lh apps/desktop-shell/src-tauri/binaries/

      - name: Install npm dependencies
        working-directory: apps/desktop-shell
        run: npm ci

      - name: Build Tauri installer (bundles sidecar)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-shell
          args: ${{ matrix.tauri-args }}
          # Only fill release fields when the trigger is a tag push;
          # workflow_dispatch runs skip release creation and only
          # upload artifacts via the next step.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Buddy {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload installer artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: buddy-installer-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
