name: Build installers

# Triggers:
#   - workflow_dispatch: any-time manual run from the Actions tab.
#       Builds installers and attaches them to the workflow run as
#       artifacts (downloadable as .zip). No GitHub Release is created.
#   - push to a tag like v1.0.0 / v0.2.3-beta1: in addition to the
#       artifact upload, attaches each per-platform installer DIRECTLY
#       as a release asset on a Draft Release named after the tag, via
#       softprops/action-gh-release. The Draft is created on the first
#       matrix job that finishes and reused by the others, so each
#       .msi / .dmg shows up as a single click-to-download link on
#       https://github.com/<owner>/<repo>/releases/tag/<tag> with no
#       .zip wrapping.
#
# Output per platform:
#   - Windows: .msi + .exe   (Buddy_X.Y.Z_x64_en-US.msi, Buddy_X.Y.Z_x64-setup.exe)
#   - macOS:   signed + notarized .dmg and .app.zip
#              (aarch64-apple-darwin / Apple Silicon)
#
# Sidecar: Tauri shell is a thin wrapper that spawns desktop-server
# (the HTTP backend) at runtime. desktop-server lives in the rust/
# workspace and is NOT compiled by `cargo tauri build`. So each
# matrix entry first builds desktop-server for its target, stages it
# under apps/desktop-shell/src-tauri/binaries/desktop-server-<TRIPLE>
# per Tauri's externalBin filename convention, then runs tauri build.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bin-ext: ".exe"
            tauri-args: "--target x86_64-pc-windows-msvc"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              apps/desktop-shell/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: macos-15
            label: macos-arm64
            target: aarch64-apple-darwin
            bin-ext: ""
            tauri-args: "--target aarch64-apple-darwin"
            artifact-glob: |
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              apps/desktop-shell/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust toolchain (host + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (rust workspace)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rust
          shared-key: rust-${{ matrix.label }}

      - name: Cache cargo (src-tauri shell)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop-shell/src-tauri
          shared-key: tauri-${{ matrix.label }}

      - name: Build desktop-server backend (${{ matrix.target }})
        if: runner.os != 'macOS'
        working-directory: rust
        run: cargo build --release --bin desktop-server --target ${{ matrix.target }}

      - name: Stage desktop-server as Tauri sidecar
        if: runner.os != 'macOS'
        shell: bash
        run: |
          mkdir -p apps/desktop-shell/src-tauri/binaries
          src="rust/target/${{ matrix.target }}/release/desktop-server${{ matrix.bin-ext }}"
          dst="apps/desktop-shell/src-tauri/binaries/desktop-server-${{ matrix.target }}${{ matrix.bin-ext }}"
          cp "$src" "$dst"
          ls -lh apps/desktop-shell/src-tauri/binaries/

      - name: Stage ingest scripts as Tauri resources
        if: runner.os != 'macOS'
        # wechat_fetcher.py + defuddle_worker.js + markitdown_worker.py
        # + package.json must ride alongside the desktop-server binary so
        # the Python ingest pipeline (wechat fetch / markitdown convert)
        # works after install. Tauri's bundle.resources ["scripts/*"]
        # picks them up from this dir and lays them next to the .exe on
        # Windows (or in .app/Contents/Resources on macOS).
        shell: bash
        run: |
          mkdir -p apps/desktop-shell/src-tauri/scripts
          for f in wechat_fetcher.py defuddle_worker.js markitdown_worker.py package.json; do
            cp "rust/crates/wiki_ingest/src/$f" "apps/desktop-shell/src-tauri/scripts/$f"
          done
          ls -lh apps/desktop-shell/src-tauri/scripts/

      - name: Install npm dependencies
        working-directory: apps/desktop-shell
        run: npm ci

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_DEV_ID_APP: ${{ secrets.APPLE_DEV_ID_APP }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: bash ./scripts/import-apple-certificate.sh --skip-notary-credentials

      - name: Store Apple notary credentials
        if: runner.os == 'macOS'
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: bash ./scripts/store-apple-notary-credentials.sh

      - name: Build Tauri installer
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-shell
          args: ${{ matrix.tauri-args }}

      - name: Build signed notarized macOS bundle
        if: runner.os == 'macOS'
        env:
          APPLE_DEV_ID_APP: ${{ secrets.APPLE_DEV_ID_APP }}
        run: bash ./scripts/macos-sign-notarize.sh --target "${{ matrix.target }}"

      - name: Upload installer artifacts (workflow run)
        # Always upload the per-run artifact for download from the
        # Actions run page (workflow_dispatch path uses this).
        uses: actions/upload-artifact@v4
        with:
          name: buddy-installer-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach installers to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Buddy ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          body: |
            Installers are attached below. Pick the one for your OS:

            - **Windows**: download the `.msi` (or the NSIS `.exe`) and double-click.
            - **macOS Apple Silicon**: download the signed and notarized `.dmg`,
              open it, and drag Buddy to Applications.
          files: ${{ matrix.artifact-glob }}

      - name: Cleanup temporary Apple keychain
        if: always() && runner.os == 'macOS'
        run: |
          if [[ -n "${APPLE_KEYCHAIN_PATH:-}" && -f "${APPLE_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi
