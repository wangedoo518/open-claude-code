<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <label style="display:flex;flex-direction:column;gap:6px;">
    <span class="label" style="color:var(--fg-2);">搜索 Wiki</span>
    <input type="text" placeholder="Ctrl+K  ·  找任何页面……" style="font-family:var(--font-sans);font-size:14px;color:var(--fg-1);background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-xl);padding:10px 14px;outline:none;">
  </label>
  <label style="display:flex;flex-direction:column;gap:6px;">
    <span class="label" style="color:var(--fg-2);">聚焦态</span>
    <input type="text" value="strongly-typed workflows" style="font-family:var(--font-sans);font-size:14px;color:var(--fg-1);background:var(--ivory);border:1px solid var(--claude-blue);border-radius:var(--radius-xl);padding:10px 14px;outline:none;box-shadow:0 0 0 3px rgba(56,152,236,0.18);">
  </label>
  <label style="display:flex;flex-direction:column;gap:6px;">
    <span class="label" style="color:var(--fg-2);">禁用</span>
    <input type="text" placeholder="代理不可达" disabled style="font-family:var(--font-sans);font-size:14px;color:var(--fg-4);background:var(--warm-sand);border:1px solid var(--border-warm);border-radius:var(--radius-xl);padding:10px 14px;outline:none;opacity:.7;">
  </label>
  <label style="display:flex;flex-direction:column;gap:6px;">
    <span class="label" style="color:var(--error);">错误</span>
    <input type="text" value="空标题无法保存" style="font-family:var(--font-sans);font-size:14px;color:var(--fg-1);background:var(--ivory);border:1px solid var(--error);border-radius:var(--radius-xl);padding:10px 14px;outline:none;">
  </label>
</div>
</body></html>
