<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
  <button style="background:var(--claude-orange);color:var(--ivory);border:0;border-radius:var(--radius-lg);padding:10px 18px;font-family:var(--font-sans);font-weight:500;font-size:14px;box-shadow:0 0 0 1px var(--claude-orange);cursor:pointer;">开始对话</button>
  <button style="background:var(--near-black);color:var(--warm-silver);border:1px solid var(--dark-surface);border-radius:var(--radius-lg);padding:9.6px 16.8px;font-family:var(--font-sans);font-weight:500;font-size:14px;cursor:pointer;">立即巡检</button>
  <button style="background:var(--pure-white);color:var(--near-black);border:0;border-radius:var(--radius-lg);padding:8px 16px 8px 12px;font-family:var(--font-sans);font-weight:500;font-size:14px;box-shadow:0 0 0 1px var(--border-cream);cursor:pointer;">打开 Wiki</button>
  <button style="background:var(--warm-sand);color:var(--charcoal-warm);border:0;border-radius:var(--radius-md);padding:0 12px 0 8px;height:32px;font-family:var(--font-sans);font-weight:500;font-size:13px;box-shadow:0 0 0 1px var(--ring-warm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;"><span style="opacity:.6;">⌘K</span> 搜索</button>
  <button style="background:var(--dark-surface);color:var(--ivory);border:0;border-radius:var(--radius-md);padding:0 12px 0 8px;height:32px;font-family:var(--font-sans);font-weight:500;font-size:13px;box-shadow:0 0 0 1px #474642;cursor:pointer;">Dark Charcoal</button>
  <button style="background:transparent;color:var(--fg-2);border:0;border-radius:var(--radius-md);padding:6px 10px;font-family:var(--font-sans);font-weight:500;font-size:13px;cursor:pointer;">Ghost</button>
</div>
<div class="caption" style="color:var(--fg-3);margin-top:14px;">Every button uses ring shadows. Primary = Terracotta. Secondary = Warm Sand. Inverse = Near Black / Dark Surface.</div>
</body></html>
