<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
  <span style="font-family:var(--font-sans);font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:color-mix(in oklab, var(--claude-orange) 14%, transparent);color:var(--claude-orange);">Maintainer</span>
  <span style="font-family:var(--font-sans);font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:color-mix(in oklab, var(--success) 14%, transparent);color:var(--success);">healthy</span>
  <span style="font-family:var(--font-sans);font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:color-mix(in oklab, var(--warning) 16%, transparent);color:var(--warning);">pending · 3</span>
  <span style="font-family:var(--font-sans);font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:color-mix(in oklab, var(--error) 14%, transparent);color:var(--error);">failed</span>
  <span style="font-family:var(--font-sans);font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px;background:var(--warm-sand);color:var(--fg-2);">#karpathy-三层</span>
  <span style="font-family:var(--font-sans);font-size:11px;font-weight:500;padding:3px 8px;border-radius:999px;background:var(--near-black);color:var(--ivory);">Opus 4.5</span>
  <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:4px;background:var(--dark-surface);color:var(--warm-silver);">v2.4.1</span>
</div>
<div class="caption" style="color:var(--fg-3);margin-top:14px;">Tonal tints via <code>color-mix</code> at 14–16%. Never use saturated fills.</div>
</body></html>
