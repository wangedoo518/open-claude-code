<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:20px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:16px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;border-radius:50%;background:var(--error);"></div>
      <div style="font-family:var(--font-serif);font-size:15px;color:var(--fg-1);">Error</div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">#b53333</div>
    <div class="caption" style="color:var(--fg-3);">failed · crashed</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:16px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;border-radius:50%;background:var(--success);"></div>
      <div style="font-family:var(--font-serif);font-size:15px;color:var(--fg-1);">Success</div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">#3f8f5e</div>
    <div class="caption" style="color:var(--fg-3);">healthy · merged</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:16px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;border-radius:50%;background:var(--warning);"></div>
      <div style="font-family:var(--font-serif);font-size:15px;color:var(--fg-1);">Warning</div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">#c09640</div>
    <div class="caption" style="color:var(--fg-3);">pending review</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:16px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:12px;height:12px;border-radius:50%;background:var(--claude-blue);"></div>
      <div style="font-family:var(--font-serif);font-size:15px;color:var(--fg-1);">Focus</div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">#3898ec</div>
    <div class="caption" style="color:var(--fg-3);">the only cool color</div>
  </div>
</div>
</body></html>
