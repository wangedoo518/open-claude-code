<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center;">
  <div style="background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-lg);padding:20px;display:flex;align-items:center;gap:14px;">
    <div style="width:44px;height:44px;border-radius:var(--radius-md);background:var(--claude-orange);display:flex;align-items:center;justify-content:center;color:var(--ivory);font-family:var(--font-serif);font-size:22px;font-weight:500;">C</div>
    <div>
      <div style="font-family:var(--font-serif);font-size:20px;font-weight:500;color:var(--fg-1);line-height:1.1;">ClawWiki</div>
      <div class="caption" style="color:var(--fg-3);">desktop · v2.4.1</div>
    </div>
  </div>
  <div style="background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-lg);padding:20px;text-align:center;">
    <img src="../assets/openclaw-logo.svg" style="height:28px;display:block;margin:0 auto 8px;">
    <div class="caption" style="color:var(--fg-3);">OpenClaw</div>
  </div>
  <div style="background:var(--near-black);border-radius:var(--radius-lg);padding:20px;text-align:center;">
    <img src="../assets/favicon.svg" style="width:36px;height:36px;display:block;margin:0 auto 8px;border-radius:10px;">
    <div class="caption" style="color:var(--warm-silver);">App icon · favicon.svg</div>
  </div>
</div>
</body></html>
