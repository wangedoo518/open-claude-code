<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:20px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
  <div style="background:var(--claude-orange);border-radius:var(--radius-md);padding:14px 16px;color:var(--ivory);box-shadow:0 0 0 1px var(--claude-orange);">
    <div class="overline" style="color:rgba(250,249,245,.7);">Primary / CTA</div>
    <div style="font-family:var(--font-serif);font-size:22px;font-weight:500;margin-top:4px;">Terracotta</div>
    <div class="mono" style="font-size:11px;margin-top:8px;opacity:.85;">#c96442</div>
  </div>
  <div style="background:var(--claude-orange-shimmer);border-radius:var(--radius-md);padding:14px 16px;color:var(--ivory);">
    <div class="overline" style="color:rgba(250,249,245,.7);">Link / Accent</div>
    <div style="font-family:var(--font-serif);font-size:22px;font-weight:500;margin-top:4px;">Coral</div>
    <div class="mono" style="font-size:11px;margin-top:8px;opacity:.85;">#d97757</div>
  </div>
  <div style="background:var(--near-black);border-radius:var(--radius-md);padding:14px 16px;color:var(--ivory);">
    <div class="overline" style="color:var(--warm-silver);">Text / Dark surface</div>
    <div style="font-family:var(--font-serif);font-size:22px;font-weight:500;margin-top:4px;">Near Black</div>
    <div class="mono" style="font-size:11px;margin-top:8px;opacity:.75;">#141413</div>
  </div>
</div>
</body></html>
