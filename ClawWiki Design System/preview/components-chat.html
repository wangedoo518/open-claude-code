<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<style>
  @keyframes shim { 0%,100%{opacity:.3} 50%{opacity:1} }
  @keyframes pulse-border { 0%,100%{border-left-color:var(--claude-orange)} 50%{border-left-color:var(--claude-orange-shimmer)} }
</style>
<div style="display:flex;flex-direction:column;gap:10px;max-width:520px;">
  <div style="align-self:flex-end;background:var(--warm-sand);border-radius:var(--radius-lg);padding:10px 14px;max-width:80%;font-size:14px;color:var(--fg-2);line-height:1.55;">昨天那条关于 Karpathy 三层的 PPT，帮我总结关键观点。</div>
  <div style="align-self:flex-start;background:var(--ivory);border:1px solid var(--border-cream);border-left:3px solid var(--claude-orange);border-radius:var(--radius-lg);padding:12px 14px;max-width:92%;animation:pulse-border 2s ease-in-out infinite;">
    <div class="overline" style="margin-bottom:6px;">Maintainer · Opus 4.5</div>
    <div style="font-size:14px;color:var(--fg-1);line-height:1.60;">三层结构里，<em>raw/</em> 收原料，<em>wiki/</em> 做归纳，<em>schema/</em> 做本体…</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:8px;color:var(--claude-orange);font-size:12px;"><span style="animation:shim 1.5s ease-in-out infinite;">⏺</span> streaming · 1.4s</div>
  </div>
</div>
</body></html>
