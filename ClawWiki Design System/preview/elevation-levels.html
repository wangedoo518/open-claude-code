<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;">
  <div style="text-align:center;">
    <div style="height:70px;background:var(--ivory);border-radius:var(--radius-md);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-1);margin-top:10px;">Flat</div>
    <div class="caption" style="color:var(--fg-3);">L0 · page, inline</div>
  </div>
  <div style="text-align:center;">
    <div style="height:70px;background:var(--ivory);border-radius:var(--radius-md);border:1px solid var(--border-cream);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-1);margin-top:10px;">Contained</div>
    <div class="caption" style="color:var(--fg-3);">L1 · 1px border-cream</div>
  </div>
  <div style="text-align:center;">
    <div style="height:70px;background:var(--ivory);border-radius:var(--radius-md);box-shadow:0 0 0 1px var(--ring-warm);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-1);margin-top:10px;">Ring</div>
    <div class="caption" style="color:var(--fg-3);">L2 · warm halo</div>
  </div>
  <div style="text-align:center;">
    <div style="height:70px;background:var(--ivory);border-radius:var(--radius-md);box-shadow:0 4px 24px rgba(0,0,0,0.05);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-1);margin-top:10px;">Whisper</div>
    <div class="caption" style="color:var(--fg-3);">L3 · 24px @ 5%</div>
  </div>
  <div style="text-align:center;">
    <div style="height:70px;background:var(--warm-sand);border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.15);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;color:var(--fg-1);margin-top:10px;">Inset</div>
    <div class="caption" style="color:var(--fg-3);">L4 · pressed</div>
  </div>
</div>
</body></html>
