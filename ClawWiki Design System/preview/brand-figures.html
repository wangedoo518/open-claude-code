<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<style>
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fg-2);}
  .ic span.g{font-size:18px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--fg-2);}
  .ic .m{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);}
  .ic .l{font-family:var(--font-sans);font-size:11px;color:var(--fg-3);}
</style>
<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:12px;">
  <div class="ic"><span class="g">⏺</span><span class="l">active</span><span class="m">BLACK</span></div>
  <div class="ic"><span class="g">∙</span><span class="l">bullet</span><span class="m">OPERATOR</span></div>
  <div class="ic"><span class="g">↯</span><span class="l">fast</span><span class="m">LIGHTNING</span></div>
  <div class="ic"><span class="g">◐</span><span class="l">medium</span><span class="m">EFFORT</span></div>
  <div class="ic"><span class="g">◆</span><span class="l">done</span><span class="m">DIAMOND</span></div>
  <div class="ic"><span class="g">⚑</span><span class="l">conflict</span><span class="m">FLAG</span></div>
  <div class="ic"><span class="g">▎</span><span class="l">quote</span><span class="m">BAR</span></div>
  <div class="ic"><span class="g">▶</span><span class="l">play</span><span class="m">TRIANGLE</span></div>
</div>
<div class="caption" style="color:var(--fg-3);margin-top:14px;">Unicode figures from <code>figures.ts</code>. Use for terminal-style status. All other iconography → Lucide React.</div>
</body></html>
