<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:20px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
  <div style="background:var(--parchment);border-radius:var(--radius-sm);padding:12px 10px;box-shadow:inset 0 0 0 1px var(--border-warm);">
    <div style="height:38px;border-radius:4px;background:var(--parchment);box-shadow:inset 0 0 0 1px var(--border-warm);"></div>
    <div style="font-family:var(--font-serif);font-size:14px;margin-top:8px;color:var(--fg-1);">Parchment</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#f5f4ed</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-sm);padding:12px 10px;box-shadow:inset 0 0 0 1px var(--border-cream);">
    <div style="height:38px;border-radius:4px;background:var(--ivory);box-shadow:inset 0 0 0 1px var(--border-cream);"></div>
    <div style="font-family:var(--font-serif);font-size:14px;margin-top:8px;color:var(--fg-1);">Ivory</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#faf9f5</div>
  </div>
  <div style="background:var(--pure-white);border-radius:var(--radius-sm);padding:12px 10px;box-shadow:inset 0 0 0 1px var(--border-cream);">
    <div style="height:38px;border-radius:4px;background:var(--pure-white);box-shadow:inset 0 0 0 1px var(--border-cream);"></div>
    <div style="font-family:var(--font-serif);font-size:14px;margin-top:8px;color:var(--fg-1);">White</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#ffffff</div>
  </div>
  <div style="background:var(--warm-sand);border-radius:var(--radius-sm);padding:12px 10px;">
    <div style="height:38px;border-radius:4px;background:var(--warm-sand);box-shadow:inset 0 0 0 1px var(--ring-warm);"></div>
    <div style="font-family:var(--font-serif);font-size:14px;margin-top:8px;color:var(--fg-1);">Warm Sand</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#e8e6dc</div>
  </div>
  <div style="background:var(--dark-surface);border-radius:var(--radius-sm);padding:12px 10px;">
    <div style="height:38px;border-radius:4px;background:var(--dark-surface);box-shadow:inset 0 0 0 1px #474642;"></div>
    <div style="font-family:var(--font-serif);font-size:14px;margin-top:8px;color:var(--ivory);">Dark Surface</div>
    <div class="mono" style="font-size:10px;color:var(--warm-silver);">#30302e</div>
  </div>
</div>
</body></html>
