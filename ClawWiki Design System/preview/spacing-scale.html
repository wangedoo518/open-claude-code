<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:3px;height:3px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">3</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:4px;height:4px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">4</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:6px;height:6px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">6</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">8</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:10px;height:10px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">10</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">12</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:16px;height:16px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">16</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:20px;height:20px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">20</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:24px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">24</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:30px;height:30px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">30</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:40px;height:40px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">40</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:var(--claude-orange);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);">56</div></div>
</div>
<div style="font-family:var(--font-sans);font-size:12px;color:var(--fg-3);margin-top:14px;">8-based with half-steps at 3 / 6 / 10 / 30. Named <code>--s-1</code>..<code>--s-12</code>.</div>
</body></html>
