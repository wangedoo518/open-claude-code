<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:20px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:14px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="height:36px;border-radius:4px;background:var(--near-black);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;margin-top:10px;color:var(--fg-1);">Near Black</div>
    <div class="caption" style="color:var(--fg-3);">fg-1 · headlines</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#141413</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:14px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="height:36px;border-radius:4px;background:var(--charcoal-warm);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;margin-top:10px;color:var(--fg-1);">Charcoal Warm</div>
    <div class="caption" style="color:var(--fg-3);">fg-2 · body</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#4d4c48</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:14px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="height:36px;border-radius:4px;background:var(--olive-gray);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;margin-top:10px;color:var(--fg-1);">Olive Gray</div>
    <div class="caption" style="color:var(--fg-3);">fg-3 · secondary</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#5e5d59</div>
  </div>
  <div style="background:var(--ivory);border-radius:var(--radius-md);padding:14px;box-shadow:0 0 0 1px var(--border-cream);">
    <div style="height:36px;border-radius:4px;background:var(--stone-gray);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;margin-top:10px;color:var(--fg-1);">Stone Gray</div>
    <div class="caption" style="color:var(--fg-3);">fg-4 · metadata</div>
    <div class="mono" style="font-size:10px;color:var(--fg-4);">#87867f</div>
  </div>
  <div style="background:var(--near-black);border-radius:var(--radius-md);padding:14px;">
    <div style="height:36px;border-radius:4px;background:var(--warm-silver);"></div>
    <div style="font-family:var(--font-serif);font-size:13px;margin-top:10px;color:var(--ivory);">Warm Silver</div>
    <div class="caption" style="color:var(--stone-gray);">text on dark</div>
    <div class="mono" style="font-size:10px;color:var(--stone-gray);">#b0aea5</div>
  </div>
</div>
</body></html>
