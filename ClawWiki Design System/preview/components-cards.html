<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:22px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
  <div style="background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-lg);padding:18px;">
    <div class="overline">今日入库</div>
    <div style="font-family:var(--font-serif);font-size:32px;font-weight:500;color:var(--fg-1);line-height:1.10;margin-top:6px;font-variant-numeric:tabular-nums;">142</div>
    <div class="caption" style="color:var(--fg-3);margin-top:4px;">条 · 24h</div>
  </div>
  <div style="background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-lg);padding:18px;">
    <div class="overline">待审阅</div>
    <div style="font-family:var(--font-serif);font-size:32px;font-weight:500;color:var(--claude-orange);line-height:1.10;margin-top:6px;font-variant-numeric:tabular-nums;">3</div>
    <div class="caption" style="color:var(--fg-3);margin-top:4px;">合并冲突</div>
  </div>
  <div style="background:var(--ivory);border:1px solid var(--border-cream);border-radius:var(--radius-lg);padding:18px;box-shadow:0 4px 24px rgba(0,0,0,0.05);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div class="overline">Wiki 规模</div>
      <span style="font-family:var(--font-mono);font-size:10px;background:var(--warm-sand);color:var(--fg-2);padding:2px 6px;border-radius:4px;">+12</span>
    </div>
    <div style="font-family:var(--font-serif);font-size:32px;font-weight:500;color:var(--fg-1);line-height:1.10;margin-top:6px;font-variant-numeric:tabular-nums;">1,284</div>
    <div class="caption" style="color:var(--fg-3);margin-top:4px;">pages · 342 nodes</div>
  </div>
</div>
</body></html>
