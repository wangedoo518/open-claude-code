<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body class="ds" style="margin:0;padding:20px;background:var(--parchment);">
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;">
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:4px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">4px</div><div class="caption" style="color:var(--fg-3);">sharp</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:6px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">6px</div><div class="caption" style="color:var(--fg-3);">sm</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:8px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">8px</div><div class="caption" style="color:var(--fg-3);">md · buttons</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:10px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">10px</div><div class="caption" style="color:var(--fg-3);">lg · cards</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:14px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">14px</div><div class="caption" style="color:var(--fg-3);">xl · input</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:18px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">18px</div><div class="caption" style="color:var(--fg-3);">2xl · media</div></div>
  <div style="text-align:center;"><div style="height:60px;background:var(--warm-sand);border-radius:26px;box-shadow:inset 0 0 0 1px var(--ring-warm);"></div><div class="mono" style="font-size:10px;color:var(--fg-4);margin-top:6px;">26px</div><div class="caption" style="color:var(--fg-3);">4xl · hero</div></div>
</div>
</body></html>
